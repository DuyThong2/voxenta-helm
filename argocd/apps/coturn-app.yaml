apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coturn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vox
  source:
    repoURL: https://github.com/DuyThong2/voxenta-helm.git
    targetRevision: main
    path: charts/coturn
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: coturn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

