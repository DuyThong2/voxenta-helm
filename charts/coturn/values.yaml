# Values for the vendored dependency chart `coturn` (pschichtel/helm-charts,
# see Chart.yaml). Nested under `coturn:` because that's the dependency's name
# in Chart.yaml — this is standard Helm subchart value-scoping, NOT a naming
# collision with the fields further down in this file.
coturn:
  # hostNetwork migration (2026-07-20, DONE -- was a documented "planned, not
  # done" follow-up earlier the same day, see runbook.md's coturn section for
  # the full incident writeup). Relay ports now bind straight to the static
  # node's real network via hostNetwork instead of going through the
  # Service/NLB -- the per-port-listener Service design could never scale the
  # relay pool past ~48 concurrent calls (AWS NLBs hard-cap at 50 listeners
  # total, non-adjustable, confirmed live via a real CreateListener
  # TooManyListeners error). Control ports (TCP/UDP 3478/3479) are UNCHANGED,
  # still served via the Service/NLB below -- only the relay range moved.
  #
  # MUST be nested here (inside `coturn:`), NOT a top-level sibling of it --
  # Helm scopes a local subchart's values by its directory name under
  # charts/, which is "coturn" here, matching this key. A top-level
  # hostNetwork/nodeSelector would silently stay in the PARENT chart's own
  # values and never reach the subchart's template at all (caught this via
  # `helm template` before deploying -- the first version of this patch had
  # exactly that bug, rendered with hostNetwork/dnsPolicy simply missing,
  # no error).
  hostNetwork: true
  # Pinned to the static node group specifically (NOT the Karpenter-managed
  # `general` pool, which churns/consolidates routinely) -- see
  # infrastructure/infrastructureBE/main.tf's aws_eip.coturn comment for why
  # that matters: this node's public IP is now a manually-associated Elastic
  # IP (13.250.131.165), and an IP pin is worthless on a node that gets
  # replaced out from under it.
  nodeSelector:
    eks.amazonaws.com/nodegroup: vox-eks-static-ng

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local
    # Keep everything (control port + relay range) on ONE Service/NLB —
    # matches "coturn" section of task/deploy-structure/execution-plan.md.
    separateRelayService: false
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

  coturn:
    realm: turn.voxenta.net
    # Elastic IP manually associated with the static node's primary ENI (see
    # infrastructure/infrastructureBE/main.tf's aws_eip.coturn) -- NOT
    # automated end-to-end (see that resource's comment: the static node
    # group's actual instance isn't a directly Terraform-owned resource, so
    # there's no stable reference to attach this to declaratively). If the
    # static node is ever replaced, re-associate the EIP AND update this
    # value AND vox/coturn's TURN_URL secret -- 3 manual steps, see
    # runbook.md's coturn hostNetwork section.
    externalIp: "13.250.131.165"
    ports:
      # UDP stays 3478 (unchanged, still the primary/actually-used transport).
      # TCP moved to a different EXTERNAL Service port -- see the long comment
      # on this key in charts/coturn/charts/coturn/values.yaml for why. Both
      # still go through the Service/NLB (unchanged by the hostNetwork
      # migration -- only the relay range below moved off it).
      tcpService: 3479
      # Same relay range documented in infrastructure/cluster-bootstrap/coturn/values.yaml
      # (the manual-bootstrap copy of this same underlying chart) — keep both in sync.
      # Widened to the FULL IANA ephemeral range now that hostNetwork removed
      # the NLB's 50-listener cap entirely (this range is a Security Group
      # rule now -- infrastructure/infrastructureBE/main.tf's
      # aws_security_group_rule.coturn_relay_hostnetwork -- SGs have no such
      # per-rule-count limit). Real target is only ~30 concurrent
      # TURN-relayed calls (confirmed 2026-07-20), so this is deliberately
      # oversized for headroom (was capacity-constrained at 48 before this
      # migration; isn't anymore) -- shrinking it buys nothing now, so no
      # reason to.
      relay:
        min: 49152
        max: 65535
    # No TLS cert configured (coturn.tls.secretName left unset) — matches the
    # original plan's scope, which never specced TURNS/DTLS for coturn.
    staticUsers:
      # Bring-your-own Secret (produced by our own ExternalSecret below), NOT
      # the chart's own `staticUsers.users:` map (that would bake a plaintext
      # password into this values.yaml/git).
      secretName: coturn-static-users

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# --- Vox-specific values (NOT part of the coturn dependency's schema) ---

# Fixed, non-secret TURN username. Long-term-credential TURN auth only requires
# the *password* (TURN_CREDENTIAL) to be secret; the username can be a stable
# constant. MUST exactly match the "TURN_USERNAME" value seeded into AWS
# Secrets Manager's `vox/coturn` secret (see runbook.md step 5.10/worksheet.txt
# [6] — runbook already uses this same literal "vox" in its example CLI command).
# Why fixed: the coturn chart's `staticUsers.secretName` mounts a Secret whose
# KEY NAME is the username and whose VALUE is the password — ExternalSecret
# can't derive a key *name* from another secret's *value*, so the username has
# to be a value we choose here, not something read dynamically from Secrets Manager.
turnUsername: vox

externalSecret:
  refreshInterval: 1h
  secretStoreRef: aws-secrets-manager
