apiVersion: v1
kind: Service
metadata:
  name: {{ include "coturn.fullname" . }}
  labels:
    {{- include "coturn.labels" . | nindent 4 }}
  {{- $annotations := mergeOverwrite (deepCopy .Values.service.annotations) .Values.service.mainAnnotations }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  allocateLoadBalancerNodePorts: {{ .Values.service.allocateLoadBalancerNodePorts }}
  ports:
    - name: turn-tcp
      port: {{ .Values.coturn.ports.tcpService | default .Values.coturn.ports.listening }}
      protocol: TCP
      targetPort: {{ .Values.coturn.ports.listening }}
    - name: turn-udp
      port: {{ .Values.coturn.ports.listening }}
      protocol: UDP
      targetPort: {{ .Values.coturn.ports.listening }}
    {{- if .Values.coturn.tls.secretName }}
    - name: turn-tcp-tls
      port: {{ .Values.coturn.ports.tlsListening }}
      protocol: TCP
      targetPort: {{ .Values.coturn.ports.tlsListening }}
    - name: turn-udp-dtls
      port: {{ .Values.coturn.ports.tlsListening }}
      protocol: UDP
      targetPort: {{ .Values.coturn.ports.tlsListening }}
    {{- end }}
    {{- /* LOCAL PATCH -- with hostNetwork the relay range binds straight to
    the node, no Service exposure needed (or possible without hitting the
    NLB's 50-listener cap again) -- see the long comment on this in
    values.yaml/deployment.yaml. */}}
    {{- if and (not .Values.service.separateRelayService) (not .Values.hostNetwork) }}
    {{- range untilStep (.Values.coturn.ports.relay.min | int) (add .Values.coturn.ports.relay.max 1 | int) 1 }}
    - name: relay-{{ . }}
      port: {{ . }}
      protocol: UDP
      targetPort: {{ . }}
    {{- end }}
    {{- end }}
  selector:
    {{- include "coturn.selectorLabels" . | nindent 4 }}
