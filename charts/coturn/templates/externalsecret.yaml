# Feeds the coturn server's own long-term-credential auth (`coturn.coturn.staticUsers.secretName`
# in values.yaml). NOT the same as `charts/agents`'s own ExternalSecret (which feeds the *client*
# side, TURN_USERNAME/TURN_CREDENTIAL env vars for agents' ICE server config) — both read the same
# underlying `vox/coturn` AWS Secrets Manager secret, but this one only needs the password, keyed
# by the fixed username (see values.yaml's `turnUsername` comment for why the key name is fixed).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coturn-static-users
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreRef }}
  target:
    name: coturn-static-users
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.turnUsername | quote }}
      remoteRef:
        key: vox/coturn
        property: TURN_CREDENTIAL

