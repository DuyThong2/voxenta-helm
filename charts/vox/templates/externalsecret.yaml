apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vox-env
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreRef }}
  target:
    name: vox-env
    creationPolicy: Owner
  data:
    # `POSTGRES_PASSWORD` feeds the bitnami postgresql subchart's own bootstrap
    # password (postgresql.auth.existingSecret/secretKeys above point at this
    # same key in this same Secret). `DB_PASSWORD` feeds the app itself —
    # application.yaml:113 reads `${DB_PASSWORD}`, NOT `SPRING_DATASOURCE_PASSWORD`
    # (Spring Boot's auto-binding convention doesn't apply here because the app
    # defines its own `app.datasource`-style property names). Both keys must
    # carry the exact same value since they're the password for the same DB
    # user — mapped twice from the one AWS property on purpose, not a typo.
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: vox/database
        property: POSTGRES_PASSWORD
    - secretKey: DB_PASSWORD
      remoteRef:
        key: vox/database
        property: POSTGRES_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: vox/jwt
        property: JWT_SECRET
    - secretKey: JWT_STREAM_SECRET
      remoteRef:
        key: vox/jwt
        property: JWT_STREAM_SECRET
    # vox/app groups the remaining app-level secrets that don't fit database/jwt
    # (application.yaml requires all of these to start — no defaults):
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: vox/app
        property: SMTP_USERNAME
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: vox/app
        property: SMTP_PASSWORD
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: vox/app
        property: GOOGLE_CLIENT_SECRET
    - secretKey: SYS_ADMIN_EMAIL
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_EMAIL
    - secretKey: SYS_ADMIN_PASSWORD
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_PASSWORD
    - secretKey: SYS_ADMIN_PHONE
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_PHONE
    - secretKey: SYS_ADMIN_FULLNAME
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_FULLNAME
    - secretKey: SYS_ADMIN_DATE_OF_BIRTH
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_DATE_OF_BIRTH
    - secretKey: SYS_ADMIN_ADDRESS
      remoteRef:
        key: vox/app
        property: SYS_ADMIN_ADDRESS
    # vox's own S3 storage credential (exam upload bucket) — a separate IAM
    # user from the CI/CD github-actions-* users, do not reuse those.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: vox/app
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: vox/app
        property: AWS_SECRET_ACCESS_KEY

