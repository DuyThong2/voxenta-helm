replicaCount: 2
image:
  repository: 975049890010.dkr.ecr.ap-southeast-1.amazonaws.com/vox-app
  tag: a10f84d
  pullPolicy: IfNotPresent
service:
  port: 8080
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 85
  targetMemoryUtilizationPercentage: 85
resources:
  # RAM raised generously (measured usage ~813-870Mi per pod via kubectl top,
  # was ~85% of the old 1Gi request -- constantly tripping the old 75%
  # target). CPU kept close to the original 500m -- measured usage was only
  # 157-230m, not the bottleneck, no need to grow it much.
  requests:
    cpu: 600m
    memory: 2Gi
  limits:
    cpu: "1"
    memory: 4Gi
ingress:
  enabled: true
  host: api.voxenta.net
  certificateArn: "arn:aws:acm:ap-southeast-1:975049890010:certificate/ed1ba235-3c99-432e-a370-5ab0312a4d3a"
  albGroupName: vox-backend
  # Must match agents' 3600 -- all 4 Ingresses share one physical ALB
  # (group.name: vox-backend), and idle_timeout is a load-balancer-level
  # attribute, not per-target-group -- mismatched values across group
  # members block the whole ALB from provisioning (confirmed for real:
  # "conflicting load balancer attributes idle_timeout.timeout_seconds:
  # 3600 | 300"). Longer timeout doesn't hurt vox's normal short requests.
  idleTimeoutSeconds: 3600
config:
  SPRING_PROFILES_ACTIVE: prod
  # DemoEducationDataInitializer (@Order(5), ApplicationRunner) seeds a full
  # demo dataset on first startup when enabled: 1 School (DEMO-SCH-01), users
  # (admin/teacher/student, all with DEMO_DATA_PASSWORD below), a
  # SupportedLanguage row, and 1 QuestionBank + QuestionTopic + Question +
  # QuestionEvaluationGuide -- enough to actually run an exam end-to-end
  # without hand-writing SQL against the JPA schema (fragile, easy to drift
  # from entity/migration changes -- this reuses the app's own tested seeding
  # code instead). Runs every startup but is idempotent by DEMO_SCHOOL_CODE
  # (checks School existence first) -- safe to leave "true" across restarts.
  DEMO_DATA_ENABLED: "true"
  DEMO_DATA_PASSWORD: "Password@123"
  KAFKA_BOOTSTRAP_SERVERS: vox-kafka.vox.svc.cluster.local:9092
  REDIS_HOST: vox-redis-master.vox.svc.cluster.local
  REDIS_PORT: "6379"
  # application.yaml:111 builds jdbc:postgresql://${DB_URL}/${DB_NAME} — DB_URL
  # is host:port ONLY, not a full JDBC URL. Matches postgresql.auth.username/
  # database below (must stay in sync if either changes).
  DB_URL: vox-postgresql.vox.svc.cluster.local:5432
  DB_NAME: vox
  DB_USER: vox
  # Google OAuth client ID is not sensitive (it's a public identifier embedded
  # in redirect URLs) — only GOOGLE_CLIENT_SECRET (externalsecret.yaml) is secret.
  GOOGLE_CLIENT_ID: "378994619054-r330gi2bjasmna0lhgohiof8hg9gio6i.apps.googleusercontent.com"
  # Frontend routes the app links to after email flows — real domain, not a
  # secret. Update if the frontend's actual route paths differ.
  PASSWORD_SETUP_URL: https://voxenta.net/setup-password
  OAUTH2_URL: https://voxenta.net/oauth2/success
  # Exam-upload S3 storage (application.yaml:123-133) — all optional/empty by
  # Spring default, but STORAGE_PROVIDER=s3 is what the real dev .env uses, so
  # treat as required for the upload feature to actually work in production.
  # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY for this are in externalsecret.yaml
  # (vox/app) — a separate IAM user from CI/CD, not the github-actions-* ones.
  STORAGE_PROVIDER: s3
  AWS_REGION: ap-southeast-1
  AWS_S3_PATH_STYLE: "false"
  # Same bucket already used in dev (vox/.env) -- reused as-is, not created by
  # infrastructureBE/infrastructureFE Terraform.
  AWS_S3_BUCKET: vox-exam-uploads
  AWS_S3_KEY_PREFIX: prod
  AWS_S3_PUBLIC_BASE_URL: https://vox-exam-uploads.s3.ap-southeast-1.amazonaws.com
externalSecret:
  refreshInterval: 1h
  secretStoreRef: aws-secrets-manager
postgresql:
  auth:
    existingSecret: vox-env
    secretKeys:
      adminPasswordKey: POSTGRES_PASSWORD
      userPasswordKey: POSTGRES_PASSWORD
    username: vox
    database: vox
  primary:
    persistence:
      enabled: true
      storageClass: gp3
      size: 20Gi
    # Public NLB so pgAdmin/DBeaver/etc. from outside the cluster can connect
    # directly on 5432 -- deliberately open to the internet (no IP allowlist),
    # protected only by the POSTGRES_PASSWORD in `vox/database` (Secrets
    # Manager). This is a real tradeoff, not an oversight: port 5432 WILL get
    # scanned/probed by internet bots. If that becomes a problem, narrow with
    # a security-group CIDR restriction or switch to `kubectl port-forward`.
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
redis:
  architecture: standalone
  auth:
    enabled: false
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: true
      storageClass: gp3
      size: 5Gi
    extraFlags:
      - --appendonly yes
kafka:
  # bitnami/kafka has zero public tags left on Docker Hub (Broadcom moved
  # versioned images behind the paid "Bitnami Secure Images" tier) -- confirmed
  # for real during deploy: ImagePullBackOff, "not found". bitnamilegacy/kafka
  # has the exact same image/tag (just relocated org, not a different build)
  # -- verified this tag exists there before switching. postgresql/redis
  # subcharts still pull fine from bitnami/ as of this deploy; only override
  # the one that's actually broken, don't preemptively touch those.
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
  kraft:
    enabled: true
  # Kafka defaults offsets.topic.replication.factor=3 (needs 3 brokers to
  # replicate the internal __consumer_offsets topic to) -- with only 1
  # controller/broker (controller.replicaCount: 1, broker.replicaCount: 0),
  # that requirement can never be satisfied, so the topic silently never gets
  # created and EVERY consumer group permanently fails with "Group Coordinator
  # Not Available" -- confirmed for real: `kafka-topics.sh --describe
  # --topic __consumer_offsets` returned "Topic does not exist". Not a
  # transient startup delay, doesn't self-resolve. Same reasoning applies to
  # transaction.state.log.replication.factor (not currently used by any
  # producer here, but fixing both together avoids hitting this again later).
  overrideConfiguration:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
  controller:
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: gp3
      size: 30Gi
  broker:
    replicaCount: 0
  listeners:
    client:
      protocol: PLAINTEXT
