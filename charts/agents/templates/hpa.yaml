{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agents
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    # GPU metric depends on kube-prometheus-stack + dcgm-exporter + prometheus-adapter.
    # vox/vox-streaming HPAs only use the CPU/memory metrics above.
    - type: Pods
      pods:
        metric:
          name: agents_gpu_utilization
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.targetGPUUtilizationPercentage | quote }}
{{- end }}

