apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agents-env
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreRef }}
  target:
    name: agents-env
    creationPolicy: Owner
  data:
    # POSTGRES_PASSWORD feeds the bitnami postgresql subchart's own bootstrap
    # password (postgresql.auth.existingSecret/secretKeys in values.yaml point
    # at this same key in this same Secret). PG_PASSWORD feeds the app itself —
    # config/postgresDB_config.py's PostgresSettings.PG_PASSWORD field, used to
    # build the PG_URI @property at read time (see values.yaml's config.PG_HOST
    # comment for why PG_URI/DATABASE_URL env vars don't work). Both keys carry
    # the same value on purpose — same DB user, same password.
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: vox/agents
        property: POSTGRES_PASSWORD
    - secretKey: PG_PASSWORD
      remoteRef:
        key: vox/agents
        property: POSTGRES_PASSWORD
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: vox/agents
        property: OPENAI_API_KEY
    - secretKey: AZURE_SPEECH_KEY
      remoteRef:
        key: vox/agents
        property: AZURE_SPEECH_KEY
    - secretKey: AZURE_SPEECH_REGION
      remoteRef:
        key: vox/agents
        property: AZURE_SPEECH_REGION
    - secretKey: VOX_STREAMING_API_KEY
      remoteRef:
        key: vox/streaming
        property: GRPC_SERVICE_TOKEN
    - secretKey: TURN_URL
      remoteRef:
        key: vox/coturn
        property: TURN_URL
    - secretKey: TURN_USERNAME
      remoteRef:
        key: vox/coturn
        property: TURN_USERNAME
    - secretKey: TURN_CREDENTIAL
      remoteRef:
        key: vox/coturn
        property: TURN_CREDENTIAL
    # Same exam-upload bucket vox writes to (boto3 in audio_storage.py reads
    # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY straight from the environment via
    # its own default credential chain — no pydantic-settings field needed for
    # these two). Sourced from vox/app, the SAME AWS secret vox's own
    # ExternalSecret reads from, not a separate credential.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: vox/app
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: vox/app
        property: AWS_SECRET_ACCESS_KEY
    # config/__init__.py: JWT_SECRET = os.getenv("JWT_SECRET", "") — used by
    # auth.py/controller/auth.py to verify tokens issued by vox. Must be the
    # SAME signing secret as vox itself, so sourced from vox/jwt, not vox/agents.
    - secretKey: JWT_SECRET
      remoteRef:
        key: vox/jwt
        property: JWT_SECRET
    # infra/voice_live_client.py — required, no default; raises at call time if
    # unset ("AZURE_VOICELIVE_API_KEY/AZURE_VOICELIVE_ENDPOINT must be set").
    # This is the real-time voice AI the oral exam conversation runs on.
    - secretKey: AZURE_VOICELIVE_API_KEY
      remoteRef:
        key: vox/agents
        property: AZURE_VOICELIVE_API_KEY
    - secretKey: AZURE_VOICELIVE_ENDPOINT
      remoteRef:
        key: vox/agents
        property: AZURE_VOICELIVE_ENDPOINT
