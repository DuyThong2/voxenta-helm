replicaCount: 1
image:
  repository: 975049890010.dkr.ecr.ap-southeast-1.amazonaws.com/vox-agents
  tag: 04078aa
  pullPolicy: IfNotPresent
service:
  port: 8000
autoscaling:
  # TEMPORARY: starts at 1 pod for a controlled first test run on the new
  # CPU-only setup, can scale up to 3 under load. Revisit once confirmed stable.
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 85
  targetMemoryUtilizationPercentage: 85
# TEMPORARY: GPU quota for this AWS account is 0 (request pending approval,
# CASE_OPENED as of this deploy) -- running YOLO (yolov8n, the "nano" variant,
# already sized for CPU/edge inference) on CPU instead so agents isn't
# permanently Pending while waiting on AWS. Revert nodeSelector/tolerations/
# resources below (and the GPU metric block in templates/hpa.yaml, removed
# in the same commit) once the quota is approved -- both are plain Helm
# changes, trivially revertable via git.
# CPU and RAM both raised generously -- measured usage was very light
# (CPU ~9m, memory ~398Mi via kubectl top) at 1CPU/1Gi, but YOLO inference
# under real exam load will need real headroom on both, unlike vox (a
# lightweight Java API server where only RAM needed real growth).
resources:
  requests:
    cpu: "2"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 4Gi
# No nodeSelector/tolerations -- schedules on the `general` NodePool (already
# allows c5/c6i, compute-optimized/sustained-CPU families, not just
# t3/t3a burstable) via plain Karpenter bin-packing, no GPU taint to tolerate.
ingress:
  enabled: true
  host: agents.voxenta.net
  certificateArn: ""
  albGroupName: vox-backend
  idleTimeoutSeconds: 3600
  stickinessSeconds: 7200
config:
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  CHROMA_HOST: agents-chromadb.vox-agents.svc.cluster.local
  CHROMA_PORT: "8000"
  VOX_STREAMING_GRPC_ADDR: vox-streaming.vox-streaming.svc.cluster.local:9091
  STUN_URLS: stun:stun.l.google.com:19302
  # config/postgresDB_config.py's PostgresSettings has no PG_URI field — it's a
  # @property computed from these individual fields at read time. Setting a
  # PG_URI env var directly has zero effect (pydantic-settings silently ignores
  # it, extra="ignore") — the app would otherwise fall back to its localhost:5433
  # dev default and fail to connect. PG_PASSWORD is in externalsecret.yaml.
  PG_HOST: agents-postgresql.vox-agents.svc.cluster.local
  PG_PORT: "5432"
  PG_USER: agents
  PG_DATABASE: agents
  PG_SSLMODE: disable
  # config/s3_config.py — shares the exam-upload bucket vox writes to (agents
  # reads audio back from it). Bucket/prefix/public-url must match
  # charts/vox/values.yaml's AWS_S3_* exactly.
  STORAGE_PROVIDER: s3
  AWS_REGION: ap-southeast-1
  AWS_S3_PATH_STYLE: "false"
  S3_BUCKET_NAME: vox-exam-uploads
  AWS_S3_KEY_PREFIX: prod
  AWS_S3_PUBLIC_BASE_URL: https://vox-exam-uploads.s3.ap-southeast-1.amazonaws.com
  # config/kafka_config.py's KAFKA_BOOTSTRAP_SERVERS defaults to localhost:9092
  # (dev-only) — agents doesn't have its own Kafka subchart, it consumes vox's.
  # KAFKA_CLIENT_ID/KAFKA_CONSUMER_GROUP/topic names keep their code defaults,
  # already matching what vox publishes on the other side.
  KAFKA_BOOTSTRAP_SERVERS: vox-kafka.vox.svc.cluster.local:9092
externalSecret:
  refreshInterval: 1h
  secretStoreRef: aws-secrets-manager
postgresql:
  auth:
    existingSecret: agents-env
    secretKeys:
      adminPasswordKey: POSTGRES_PASSWORD
      userPasswordKey: POSTGRES_PASSWORD
    username: agents
    database: agents
  primary:
    persistence:
      enabled: true
      storageClass: gp3
      size: 10Gi
chromadb:
  chromadb:
    data:
      volumeSize: 10Gi
      storageClass: gp3
