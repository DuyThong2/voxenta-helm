apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vox-streaming-env
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreRef }}
  target:
    name: vox-streaming-env
    creationPolicy: Owner
  data:
    - secretKey: JWT_STREAM_SECRET
      remoteRef:
        key: vox/jwt
        property: JWT_STREAM_SECRET
    - secretKey: GRPC_SERVICE_TOKEN
      remoteRef:
        key: vox/streaming
        property: GRPC_SERVICE_TOKEN
    # Reuses vox's own S3 credential/bucket (vox/app) instead of a dedicated
    # vox-streaming IAM user + dedicated frame/recording buckets -- deliberate
    # simplification to unblock deploying this service without provisioning
    # new AWS resources first. Same credential agents' externalsecret.yaml
    # already reuses for the same reason. Trade-off: loses the separate 7d/365d
    # lifecycle retention the original design called for (see
    # internal/infrastructure/storage/client.go's EnsureBuckets) since frames/
    # recordings now share vox's exam-uploads bucket lifecycle instead of their
    # own -- acceptable for now, revisit if that retention split actually matters.
    - secretKey: STORAGE_ACCESS_KEY
      remoteRef:
        key: vox/app
        property: AWS_ACCESS_KEY_ID
    - secretKey: STORAGE_SECRET_KEY
      remoteRef:
        key: vox/app
        property: AWS_SECRET_ACCESS_KEY
    # cmd/server/main.go's buildICEServers() already reads these correctly
    # (STUN always has a built-in default, TURN only added if TURN_URL is
    # non-empty) — just wasn't wired to the real coturn secret yet. Same
    # vox/coturn box charts/coturn and charts/agents already read from.
    - secretKey: TURN_URL
      remoteRef:
        key: vox/coturn
        property: TURN_URL
    - secretKey: TURN_USERNAME
      remoteRef:
        key: vox/coturn
        property: TURN_USERNAME
    - secretKey: TURN_CREDENTIAL
      remoteRef:
        key: vox/coturn
        property: TURN_CREDENTIAL

