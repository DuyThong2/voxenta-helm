apiVersion: v1
kind: Service
metadata:
  name: vox-streaming
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vox-streaming
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc

